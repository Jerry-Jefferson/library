services:
  dev-mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    env_file:
      - ./.env.local
    volumes:
      - dev-mongo_data:/data/db
      - dev-mongo_config_data:/data/configdb
      - ./mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh:ro

  dev-mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    env_file:
      - ./.env.local
    depends_on:
      - dev-mongodb

volumes:
  dev-mongo_data:
  dev-mongo_config_data:
